services:
  - type: web
    name: sub2api
    env: docker
    plan: starter
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      # Server
      - key: SERVER_PORT
        value: "10000"
      - key: SERVER_FRONTEND_URL
        sync: false
      - key: AUTO_SETUP
        value: "true"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # Database
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        value: "5432"
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_DBNAME
        sync: false
      - key: DATABASE_SSLMODE
        value: "require"

      # Redis
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_DB
        value: "0"
      - key: REDIS_ENABLE_TLS
        value: "true"

      # Security
      - key: JWT_SECRET
        sync: false
      - key: TOTP_ENCRYPTION_KEY
        sync: false

      # Model Status sidecar
      - key: MODEL_STATUS_ENABLED
        value: "true"
      - key: MODEL_STATUS_UPSTREAM_API_BASE_URL
        sync: false
      - key: MODEL_STATUS_UPSTREAM_API_KEY
        sync: false
      - key: MODEL_STATUS_MODELS
        value: "gpt-5,gpt-5.1,gpt-5.2,gpt-5.4,gpt-5.4-nano,gpt-5.4-mini,gpt-5.1-codex,gpt-5.1-codex-mini,gpt-5.1-codex-max,gpt-5.2-codex,gpt-5.3-codex,gpt-5.3-codex-spark"
      - key: MODEL_STATUS_ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: MODEL_STATUS_SESSION_SECRET
        sync: false
